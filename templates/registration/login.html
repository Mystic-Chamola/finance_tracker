{% extends 'base.html' %}
{% block content %}
<div class="auth-container glass">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p>Don't have an account? <a href="{% url 'register' %}">Register here</a>.</p>
    <p>Didn't receive the verification email? <a href="{% url 'resend_verification' %}">Resend</a>.</p>
</div>
{% endblock %}
