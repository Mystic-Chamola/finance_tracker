{% extends 'base.html' %}
{% load currency_filters %}
{% block content %}
<div class="form-container">
    <h2>User Settings</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Settings</button>
    </form>
    <p class="help-text">Your preferred currency will be used throughout the app.</p>
</div>
{% endblock %}
