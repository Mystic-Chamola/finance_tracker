{% extends 'base.html' %}
{% block content %}
<div class="confirm-delete">
    <h2>Delete Account</h2>
    <p class="warning-text">This action is permanent and cannot be undone. All your data will be permanently deleted.</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="checkbox-group">
            {{ form.confirm }}
            <label for="{{ form.confirm.id_for_label }}">{{ form.confirm.label }}</label>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Permanently Delete My Account</button>
            <a href="{% url 'profile' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
