{% extends 'base.html' %}
{% block content %}
<div class="page-header glass">
    <h1>Delete Account</h1>
</div>

<div class="form-container glass">
    <p class="warning-text" style="color: var(--danger);">This action is permanent and cannot be undone. All your data will be permanently deleted.</p>
    <form method="post">
        {% csrf_token %}
        <div class="checkbox-group">
            {{ form.confirm }}
            <label for="{{ form.confirm.id_for_label }}">{{ form.confirm.label }}</label>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Permanently Delete My Account</button>
            <a href="{% url 'profile' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
