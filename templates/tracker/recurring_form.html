{% extends 'base.html' %}
{% load currency_filters %}
{% block content %}
<div class="form-container">
    <h2>{{ title }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'recurring_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
    <p class="help-text">Enter amount in {{ user_currency }}. It will be converted to USD for storage.</p>
</div>
{% endblock %}
