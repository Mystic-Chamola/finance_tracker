{% extends 'base.html' %}
{% block content %}
<div class="confirm-delete">
    <h2>Delete Bill</h2>
    <p>Are you sure you want to delete "{{ bill.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'bill_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
